<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pakistan Legal RAG Chatbot</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --panel: #0a0a0a;
      --panel-2: #111111;
      --border: #2a2a2a;
      --border-soft: #1b1b1b;
      --text: #ffffff;
      --muted: #a1a1aa;
      --chip: #121212;
      --chip-hover: #1b1b1b;
      --user-bg: #ffffff;
      --user-text: #000000;
      --bot-bg: #101010;
      --shadow: 0 10px 30px rgba(255,255,255,0.03);
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      background: var(--panel);
      font-weight: 800;
      color: var(--text);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    .clear-btn {
      background: #ffffff;
      color: #000000;
      border: 1px solid #ffffff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .clear-btn:hover {
      opacity: 0.92;
    }

    .clear-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: radial-gradient(circle at top, #0b0b0b 0%, #000 45%);
      scroll-behavior: smooth;
    }

    .welcome-card {
      background: linear-gradient(180deg, #0f0f0f 0%, #090909 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .welcome-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome-text {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .chip:hover {
      background: var(--chip-hover);
      transform: translateY(-1px);
    }

    .message-row {
      display: flex;
      gap: 12px;
      width: 100%;
      align-items: flex-start;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      margin-top: 2px;
    }

    .message-row.user .avatar {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
      order: 2;
    }

    .message-row.user .content-wrap {
      align-items: flex-end;
      order: 1;
    }

    .content-wrap {
      display: flex;
      flex-direction: column;
      max-width: min(78%, 760px);
      gap: 6px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      padding: 0 4px;
    }

    .bubble {
      padding: 15px 17px;
      border-radius: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow);
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border: 1px solid #ffffff;
      border-bottom-right-radius: 7px;
    }

    .bubble.bot {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 7px;
    }

    .extra-content {
      margin-top: 8px;
    }

    .action-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .action-btn {
      background: #0d0d0d;
      color: #ffffff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .action-btn:hover {
      background: #171717;
    }

    .action-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .typing-bubble {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffffff;
      opacity: 0.35;
      animation: blink 1.2s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.25;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    details.sources {
      margin-top: 10px;
      border: 1px solid var(--border);
      background: #090909;
      border-radius: 12px;
      padding: 10px 12px;
    }

    details.sources summary {
      cursor: pointer;
      font-weight: 600;
      color: #f4f4f5;
      list-style: none;
    }

    details.sources summary::-webkit-details-marker {
      display: none;
    }

    .source-card {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: #101010;
    }

    .source-name {
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .source-text {
      font-size: 13px;
      line-height: 1.5;
      color: #d4d4d8;
      white-space: pre-wrap;
    }

    .inputbar {
      padding: 16px 22px 20px;
      border-top: 1px solid var(--border);
      background: #000000;
    }

    .input-shell {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: #070707;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      resize: none;
      min-height: 56px;
      max-height: 180px;
      border: none;
      background: transparent;
      color: white;
      padding: 10px 8px 0;
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    textarea::placeholder {
      color: #8b8b8b;
    }

    .input-hint {
      font-size: 12px;
      color: var(--muted);
      padding-left: 8px;
    }

    .send-btn {
      min-width: 102px;
      height: 52px;
      border: 1px solid #ffffff;
      border-radius: 14px;
      background: #ffffff;
      color: #000000;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .send-btn:hover {
      opacity: 0.93;
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .header {
        padding: 14px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .brand-title {
        font-size: 19px;
      }

      .clear-btn {
        width: 100%;
      }

      .messages {
        padding: 16px 14px 12px;
      }

      .welcome-card {
        padding: 16px;
      }

      .welcome-title {
        font-size: 18px;
      }

      .content-wrap {
        max-width: 88%;
      }

      .bubble {
        font-size: 14px;
      }

      .inputbar {
        padding: 12px 14px 16px;
      }

      .input-shell {
        flex-direction: column;
        align-items: stretch;
      }

      .send-btn {
        width: 100%;
      }

      .chips {
        gap: 8px;
      }

      .chip {
        width: 100%;
        text-align: left;
      }

      .action-bar {
        width: 100%;
      }

      .action-btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">PK</div>
        <div class="brand-text">
          <div class="brand-title">Pakistan Legal RAG Chatbot</div>
          <div class="brand-subtitle">Black & white legal assistant</div>
        </div>
      </div>
      <button class="clear-btn" id="clearBtn">Clear Chat</button>
    </div>

    <div class="messages" id="messages">
      <div class="welcome-card" id="welcomeCard">
        <div class="welcome-title">Ask legal questions naturally</div>
        <div class="welcome-text">
          Get concise answers about constitutional articles, penal code sections, and other legal material from your loaded dataset.
        </div>
        <div class="chips">
          <button class="chip" data-prompt="What is Article 25?">What is Article 25?</button>
          <button class="chip" data-prompt="Explain Article 9 in simple words.">Explain Article 9 in simple words.</button>
          <button class="chip" data-prompt="What is the punishment for murder under Section 302?">What is the punishment for murder under Section 302?</button>
          <button class="chip" data-prompt="What does Article 25-A say?">What does Article 25-A say?</button>
        </div>
      </div>
    </div>

    <div class="inputbar">
      <div class="input-shell">
        <div class="input-wrap">
          <textarea id="query" placeholder="Type your legal question..."></textarea>
          <div class="input-hint">Press Enter to send • Shift + Enter for new line</div>
        </div>
        <button class="send-btn" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const queryBox = document.getElementById("query");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const sessionId = "web-session-1";

    let lastUserQuery = "";
    let isBusy = false;

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function timeLabel() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function removeWelcomeCard() {
      const welcome = document.getElementById("welcomeCard");
      if (welcome) welcome.remove();
    }

    function createMessage(type, text = "") {
      removeWelcomeCard();

      const row = document.createElement("div");
      row.className = `message-row ${type}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = type === "user" ? "YOU" : "AI";

      const contentWrap = document.createElement("div");
      contentWrap.className = "content-wrap";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${type === "user" ? "You" : "Assistant"} • ${timeLabel()}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${type}`;
      bubble.textContent = text;

      const extra = document.createElement("div");
      extra.className = "extra-content";

      contentWrap.appendChild(meta);
      contentWrap.appendChild(bubble);
      contentWrap.appendChild(extra);

      row.appendChild(avatar);
      row.appendChild(contentWrap);
      messages.appendChild(row);
      scrollToBottom();

      return { row, bubble, extra };
    }

    function createTypingMessage() {
      removeWelcomeCard();

      const row = document.createElement("div");
      row.className = "message-row bot";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "AI";

      const contentWrap = document.createElement("div");
      contentWrap.className = "content-wrap";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `Assistant • ${timeLabel()}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";

      const typing = document.createElement("div");
      typing.className = "typing-bubble";

      for (let i = 0; i < 3; i++) {
        const dot = document.createElement("span");
        dot.className = "typing-dot";
        typing.appendChild(dot);
      }

      bubble.appendChild(typing);

      const extra = document.createElement("div");
      extra.className = "extra-content";

      contentWrap.appendChild(meta);
      contentWrap.appendChild(bubble);
      contentWrap.appendChild(extra);

      row.appendChild(avatar);
      row.appendChild(contentWrap);
      messages.appendChild(row);
      scrollToBottom();

      return { row, bubble, extra };
    }

    function typeText(element, text, speed = 8) {
      return new Promise((resolve) => {
        element.textContent = "";
        let i = 0;

        const interval = setInterval(() => {
          element.textContent += text[i];
          i++;
          scrollToBottom();

          if (i >= text.length) {
            clearInterval(interval);
            resolve();
          }
        }, speed);
      });
    }

    function setBusyState(state) {
      isBusy = state;
      sendBtn.disabled = state;
      clearBtn.disabled = state;
      queryBox.disabled = state;
    }

    function renderSources(extraContainer, relevantContext) {
      if (!relevantContext || !relevantContext.length) return;

      const details = document.createElement("details");
      details.className = "sources";

      const summary = document.createElement("summary");
      summary.textContent = "Show Sources";
      details.appendChild(summary);

      relevantContext.forEach(item => {
        const card = document.createElement("div");
        card.className = "source-card";

        const sourceName = document.createElement("div");
        sourceName.className = "source-name";
        sourceName.textContent = item.source || "Unknown source";

        const sourceText = document.createElement("div");
        sourceText.className = "source-text";
        sourceText.textContent = item.text || "";

        card.appendChild(sourceName);
        card.appendChild(sourceText);
        details.appendChild(card);
      });

      extraContainer.appendChild(details);
      scrollToBottom();
    }

    function createActionButton(label, onClick) {
      const btn = document.createElement("button");
      btn.className = "action-btn";
      btn.textContent = label;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function renderActionBar(extraContainer, answerText, originalQuery) {
      const bar = document.createElement("div");
      bar.className = "action-bar";

      const copyBtn = createActionButton("Copy Answer", async () => {
        try {
          await navigator.clipboard.writeText(answerText);
          copyBtn.textContent = "Copied";
          setTimeout(() => {
            copyBtn.textContent = "Copy Answer";
          }, 1200);
        } catch (err) {
          copyBtn.textContent = "Copy Failed";
          setTimeout(() => {
            copyBtn.textContent = "Copy Answer";
          }, 1200);
        }
      });

      const regenBtn = createActionButton("Regenerate", async () => {
        if (isBusy) return;
        await sendMessage(originalQuery, true);
      });

      bar.appendChild(copyBtn);
      bar.appendChild(regenBtn);
      extraContainer.appendChild(bar);
    }

    async function sendMessage(prefill = null, isRegenerate = false) {
      const query = (prefill ?? queryBox.value).trim();
      if (!query || isBusy) return;

      if (!isRegenerate) {
        createMessage("user", query);
      }

      lastUserQuery = query;
      queryBox.value = "";
      setBusyState(true);

      const botMessage = createTypingMessage();
      const botBubble = botMessage.bubble;
      const botExtra = botMessage.extra;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: query,
            session_id: sessionId
          })
        });

        const raw = await res.text();

        if (!res.ok) {
          botBubble.textContent = `Backend error (${res.status}): ${raw}`;
          return;
        }

        const data = JSON.parse(raw);
        const answer = data.answer || "No answer returned.";

        await typeText(botBubble, answer, 8);
        renderActionBar(botExtra, answer, query);
        renderSources(botExtra, data.relevant_context);
      } catch (err) {
        botBubble.textContent = `Connection error: ${err.message}`;
      } finally {
        setBusyState(false);
        queryBox.focus();
      }
    }

    async function clearChat() {
      try {
        setBusyState(true);

        await fetch("/chat/clear", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: "clear",
            session_id: sessionId
          })
        });

        messages.innerHTML = `
          <div class="welcome-card" id="welcomeCard">
            <div class="welcome-title">Ask legal questions naturally</div>
            <div class="welcome-text">
              Get concise answers about constitutional articles, penal code sections, and other legal material from your loaded dataset.
            </div>
            <div class="chips">
              <button class="chip" data-prompt="What is Article 25?">What is Article 25?</button>
              <button class="chip" data-prompt="Explain Article 9 in simple words.">Explain Article 9 in simple words.</button>
              <button class="chip" data-prompt="What is the punishment for murder under Section 302?">What is the punishment for murder under Section 302?</button>
              <button class="chip" data-prompt="What does Article 25-A say?">What does Article 25-A say?</button>
            </div>
          </div>
        `;
        lastUserQuery = "";
        attachChipEvents();
      } catch (err) {
        createMessage("bot", `Could not clear chat: ${err.message}`);
      } finally {
        setBusyState(false);
      }
    }

    function attachChipEvents() {
      document.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          sendMessage(chip.dataset.prompt || "");
        });
      });
    }

    sendBtn.addEventListener("click", () => sendMessage());
    clearBtn.addEventListener("click", clearChat);

    queryBox.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    attachChipEvents();
  </script>
</body>
</html>
