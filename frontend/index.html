<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pakistan Legal RAG Chatbot</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --panel: #0a0a0a;
      --border: #2a2a2a;
      --border-soft: #1b1b1b;
      --text: #ffffff;
      --muted: #a1a1aa;
      --chip: #121212;
      --chip-hover: #1b1b1b;
      --user-bg: #ffffff;
      --user-text: #000000;
      --bot-bg: #101010;
      --shadow: 0 10px 30px rgba(255,255,255,0.03);
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: flex;
      height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      width: 300px;
      border-right: 1px solid var(--border);
      background: #050505;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
    }

    .sidebar-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sidebar-btn {
      border: 1px solid var(--border);
      background: #ffffff;
      color: #000000;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .sidebar-btn.secondary {
      background: #111111;
      color: #ffffff;
      border: 1px solid var(--border);
    }

    .sidebar-btn:hover {
      opacity: 0.93;
    }

    .sidebar-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .conversation-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #0d0d0d;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .conversation-item:hover {
      background: #131313;
    }

    .conversation-item.active {
      border-color: #ffffff;
      background: #141414;
    }

    .conversation-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .conversation-title {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
      line-height: 1.4;
      flex: 1;
    }

    .conversation-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .delete-chat-btn {
      background: transparent;
      color: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }

    .delete-chat-btn:hover {
      background: #1a1a1a;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      background: var(--panel);
      font-weight: 800;
      color: var(--text);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header-btn {
      background: #ffffff;
      color: #000000;
      border: 1px solid #ffffff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .header-btn.secondary {
      background: #111111;
      color: #ffffff;
      border: 1px solid var(--border);
    }

    .header-btn:hover {
      opacity: 0.92;
    }

    .header-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: radial-gradient(circle at top, #0b0b0b 0%, #000 45%);
      scroll-behavior: smooth;
    }

    .welcome-card {
      background: linear-gradient(180deg, #0f0f0f 0%, #090909 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .welcome-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome-text {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .chip:hover {
      background: var(--chip-hover);
      transform: translateY(-1px);
    }

    .message-row {
      display: flex;
      gap: 12px;
      width: 100%;
      align-items: flex-start;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      margin-top: 2px;
    }

    .message-row.user .avatar {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
      order: 2;
    }

    .message-row.user .content-wrap {
      align-items: flex-end;
      order: 1;
    }

    .content-wrap {
      display: flex;
      flex-direction: column;
      max-width: min(78%, 760px);
      gap: 6px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      padding: 0 4px;
    }

    .bubble {
      padding: 15px 17px;
      border-radius: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow);
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border: 1px solid #ffffff;
      border-bottom-right-radius: 7px;
    }

    .bubble.bot {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 7px;
    }

    .extra-content {
      margin-top: 8px;
    }

    .action-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .action-btn {
      background: #0d0d0d;
      color: #ffffff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .action-btn:hover {
      background: #171717;
    }

    .action-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .typing-bubble {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 20px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffffff;
      opacity: 0.35;
      animation: blink 1.2s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.25;
        transform: translateY(0);
      }
      40% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    details.sources {
      margin-top: 10px;
      border: 1px solid var(--border);
      background: #090909;
      border-radius: 12px;
      padding: 10px 12px;
    }

    details.sources summary {
      cursor: pointer;
      font-weight: 600;
      color: #f4f4f5;
      list-style: none;
    }

    details.sources summary::-webkit-details-marker {
      display: none;
    }

    .source-card {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: #101010;
    }

    .source-name {
      font-size: 12px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .source-text {
      font-size: 13px;
      line-height: 1.5;
      color: #d4d4d8;
      white-space: pre-wrap;
    }

    .inputbar {
      padding: 16px 22px 20px;
      border-top: 1px solid var(--border);
      background: #000000;
    }

    .input-shell {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: #070707;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea {
      width: 100%;
      resize: none;
      min-height: 56px;
      max-height: 180px;
      border: none;
      background: transparent;
      color: white;
      padding: 10px 8px 0;
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    textarea::placeholder {
      color: #8b8b8b;
    }

    .input-hint {
      font-size: 12px;
      color: var(--muted);
      padding-left: 8px;
    }

    .send-btn {
      min-width: 102px;
      height: 52px;
      border: 1px solid #ffffff;
      border-radius: 14px;
      background: #ffffff;
      color: #000000;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .send-btn:hover {
      opacity: 0.93;
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    @media (max-width: 960px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 220px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 14px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .brand-title {
        font-size: 19px;
      }

      .header-actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .messages {
        padding: 16px 14px 12px;
      }

      .welcome-card {
        padding: 16px;
      }

      .welcome-title {
        font-size: 18px;
      }

      .content-wrap {
        max-width: 88%;
      }

      .bubble {
        font-size: 14px;
      }

      .inputbar {
        padding: 12px 14px 16px;
      }

      .input-shell {
        flex-direction: column;
        align-items: stretch;
      }

      .send-btn {
        width: 100%;
      }

      .chips {
        gap: 8px;
      }

      .chip {
        width: 100%;
        text-align: left;
      }

      .action-bar {
        width: 100%;
      }

      .action-btn {
        flex: 1;
      }

      .sidebar-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Conversations</div>
        <div class="sidebar-actions">
          <button class="sidebar-btn" id="newChatBtn">New Chat</button>
          <button class="sidebar-btn secondary" id="exportTxtBtn">Export TXT</button>
          <button class="sidebar-btn secondary" id="exportJsonBtn">Export JSON</button>
        </div>
      </div>
      <div class="conversation-list" id="conversationList"></div>
    </aside>

    <main class="main">
      <div class="header">
        <div class="brand">
          <div class="brand-icon">PK</div>
          <div class="brand-text">
            <div class="brand-title">Pakistan Legal RAG Chatbot</div>
            <div class="brand-subtitle">Black & white legal assistant</div>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn secondary" id="renameChatBtn">Rename Chat</button>
          <button class="header-btn" id="clearBtn">Clear Chat</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="inputbar">
        <div class="input-shell">
          <div class="input-wrap">
            <textarea id="query" placeholder="Type your legal question..."></textarea>
            <div class="input-hint">Press Enter to send • Shift + Enter for new line</div>
          </div>
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const queryBox = document.getElementById("query");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const renameChatBtn = document.getElementById("renameChatBtn");
    const exportTxtBtn = document.getElementById("exportTxtBtn");
    const exportJsonBtn = document.getElementById("exportJsonBtn");
    const conversationList = document.getElementById("conversationList");

    const STORAGE_KEY = "pk_legal_chat_sessions_v1";

    let isBusy = false;
    let sessions = loadSessions();
    let currentSessionId = sessions[0]?.id || createNewSession();

    function generateId() {
      return "session-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
    }

    function timeLabel() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function formatDate(timestamp) {
      return new Date(timestamp).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSessions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function getCurrentSession() {
      return sessions.find(s => s.id === currentSessionId);
    }

    function createNewSession() {
      const id = generateId();
      const session = {
        id,
        title: "New Chat",
        created_at: Date.now(),
        updated_at: Date.now(),
        messages: []
      };
      sessions.unshift(session);
      saveSessions();
      return id;
    }

    function ensureCurrentSession() {
      if (!getCurrentSession()) {
        currentSessionId = createNewSession();
      }
    }

    function updateSessionTitle(session, firstUserMessage) {
      if (!session) return;
      if (session.title === "New Chat" || !session.title) {
        session.title = firstUserMessage.length > 40
          ? firstUserMessage.slice(0, 40) + "..."
          : firstUserMessage;
      }
    }

    function deleteConversation(sessionId) {
      const confirmed = confirm("Are you sure you want to delete this conversation?");
      if (!confirmed) return;

      sessions = sessions.filter(session => session.id !== sessionId);

      if (sessions.length === 0) {
        currentSessionId = createNewSession();
      } else if (currentSessionId === sessionId) {
        currentSessionId = sessions[0].id;
      }

      saveSessions();
      renderConversationList();
      renderCurrentSessionMessages();
    }

    function renderConversationList() {
      conversationList.innerHTML = "";

      sessions.sort((a, b) => b.updated_at - a.updated_at);

      sessions.forEach(session => {
        const item = document.createElement("div");
        item.className = "conversation-item" + (session.id === currentSessionId ? " active" : "");
        item.dataset.id = session.id;

        const top = document.createElement("div");
        top.className = "conversation-top";

        const title = document.createElement("div");
        title.className = "conversation-title";
        title.textContent = session.title || "Untitled Chat";

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-chat-btn";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteConversation(session.id);
        });

        top.appendChild(title);
        top.appendChild(deleteBtn);

        const meta = document.createElement("div");
        meta.className = "conversation-meta";
        meta.textContent = `${session.messages.length} messages • ${formatDate(session.updated_at)}`;

        item.appendChild(top);
        item.appendChild(meta);

        item.addEventListener("click", () => {
          currentSessionId = session.id;
          renderConversationList();
          renderCurrentSessionMessages();
        });

        conversationList.appendChild(item);
      });
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function createWelcomeCard() {
      const card = document.createElement("div");
      card.className = "welcome-card";
      card.id = "welcomeCard";
      card.innerHTML = `
        <div class="welcome-title">Ask legal questions naturally</div>
        <div class="welcome-text">
          Get concise answers about constitutional articles, penal code sections, and other legal material from your loaded dataset.
        </div>
        <div class="chips">
          <button class="chip" data-prompt="What is Article 25?">What is Article 25?</button>
          <button class="chip" data-prompt="Explain Article 9 in simple words.">Explain Article 9 in simple words.</button>
          <button class="chip" data-prompt="What is the punishment for murder under Section 302?">What is the punishment for murder under Section 302?</button>
          <button class="chip" data-prompt="What does Article 25-A say?">What does Article 25-A say?</button>
        </div>
      `;
      messages.appendChild(card);
      attachChipEvents();
    }

    function createStaticMessage(message) {
      const row = document.createElement("div");
      row.className = `message-row ${message.type}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = message.type === "user" ? "YOU" : "AI";

      const contentWrap = document.createElement("div");
      contentWrap.className = "content-wrap";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${message.type === "user" ? "You" : "Assistant"} • ${message.time || timeLabel()}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${message.type}`;
      bubble.textContent = message.text || "";

      const extra = document.createElement("div");
      extra.className = "extra-content";

      contentWrap.appendChild(meta);
      contentWrap.appendChild(bubble);
      contentWrap.appendChild(extra);

      row.appendChild(avatar);
      row.appendChild(contentWrap);
      messages.appendChild(row);

      if (message.type === "bot") {
        renderActionBar(extra, message.text || "", message.query || "");
        renderSources(extra, message.sources || []);
      }
    }

    function renderCurrentSessionMessages() {
      ensureCurrentSession();
      messages.innerHTML = "";

      const session = getCurrentSession();
      if (!session || session.messages.length === 0) {
        createWelcomeCard();
        scrollToBottom();
        return;
      }

      session.messages.forEach(msg => createStaticMessage(msg));
      scrollToBottom();
    }

    function createMessage(type, text = "") {
      const row = document.createElement("div");
      row.className = `message-row ${type}`;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = type === "user" ? "YOU" : "AI";

      const contentWrap = document.createElement("div");
      contentWrap.className = "content-wrap";

      const meta = document.createElement("div");
      meta.className = "meta";
      const stamp = timeLabel();
      meta.textContent = `${type === "user" ? "You" : "Assistant"} • ${stamp}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${type}`;
      bubble.textContent = text;

      const extra = document.createElement("div");
      extra.className = "extra-content";

      contentWrap.appendChild(meta);
      contentWrap.appendChild(bubble);
      contentWrap.appendChild(extra);

      row.appendChild(avatar);
      row.appendChild(contentWrap);
      messages.appendChild(row);
      scrollToBottom();

      return { row, bubble, extra, time: stamp };
    }

    function createTypingMessage() {
      const row = document.createElement("div");
      row.className = "message-row bot";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "AI";

      const contentWrap = document.createElement("div");
      contentWrap.className = "content-wrap";

      const meta = document.createElement("div");
      meta.className = "meta";
      const stamp = timeLabel();
      meta.textContent = `Assistant • ${stamp}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";

      const typing = document.createElement("div");
      typing.className = "typing-bubble";

      for (let i = 0; i < 3; i++) {
        const dot = document.createElement("span");
        dot.className = "typing-dot";
        typing.appendChild(dot);
      }

      bubble.appendChild(typing);

      const extra = document.createElement("div");
      extra.className = "extra-content";

      contentWrap.appendChild(meta);
      contentWrap.appendChild(bubble);
      contentWrap.appendChild(extra);

      row.appendChild(avatar);
      row.appendChild(contentWrap);
      messages.appendChild(row);
      scrollToBottom();

      return { row, bubble, extra, time: stamp };
    }

    function setBusyState(state) {
      isBusy = state;
      sendBtn.disabled = state;
      clearBtn.disabled = state;
      queryBox.disabled = state;
      newChatBtn.disabled = state;
      renameChatBtn.disabled = state;
      exportTxtBtn.disabled = state;
      exportJsonBtn.disabled = state;
    }

    function renderSources(extraContainer, relevantContext) {
      if (!relevantContext || !relevantContext.length) return;

      const details = document.createElement("details");
      details.className = "sources";

      const summary = document.createElement("summary");
      summary.textContent = "Show Sources";
      details.appendChild(summary);

      relevantContext.forEach(item => {
        const card = document.createElement("div");
        card.className = "source-card";

        const sourceName = document.createElement("div");
        sourceName.className = "source-name";
        sourceName.textContent = item.source || "Unknown source";

        const sourceText = document.createElement("div");
        sourceText.className = "source-text";
        sourceText.textContent = item.text || "";

        card.appendChild(sourceName);
        card.appendChild(sourceText);
        details.appendChild(card);
      });

      extraContainer.appendChild(details);
      scrollToBottom();
    }

    function createActionButton(label, onClick) {
      const btn = document.createElement("button");
      btn.className = "action-btn";
      btn.textContent = label;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function renderActionBar(extraContainer, answerText, originalQuery) {
      const bar = document.createElement("div");
      bar.className = "action-bar";

      const copyBtn = createActionButton("Copy Answer", async () => {
        try {
          await navigator.clipboard.writeText(answerText);
          copyBtn.textContent = "Copied";
          setTimeout(() => {
            copyBtn.textContent = "Copy Answer";
          }, 1200);
        } catch {
          copyBtn.textContent = "Copy Failed";
          setTimeout(() => {
            copyBtn.textContent = "Copy Answer";
          }, 1200);
        }
      });

      const regenBtn = createActionButton("Regenerate", async () => {
        if (isBusy || !originalQuery) return;
        await sendMessage(originalQuery, true);
      });

      bar.appendChild(copyBtn);
      bar.appendChild(regenBtn);
      extraContainer.appendChild(bar);
    }

    async function sendMessage(prefill = null, isRegenerate = false) {
      const query = (prefill ?? queryBox.value).trim();
      if (!query || isBusy) return;

      ensureCurrentSession();
      const session = getCurrentSession();
      messages.querySelector("#welcomeCard")?.remove();

      if (!isRegenerate) {
        const userMessage = createMessage("user", query);
        session.messages.push({
          type: "user",
          text: query,
          time: userMessage.time
        });
      }

      updateSessionTitle(session, query);
      session.updated_at = Date.now();
      saveSessions();
      renderConversationList();

      queryBox.value = "";
      setBusyState(true);

      const botMessage = createTypingMessage();
      const botBubble = botMessage.bubble;
      const botExtra = botMessage.extra;

      try {
        const res = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: query,
            session_id: currentSessionId
          })
        });

        if (!res.ok || !res.body) {
          const errText = await res.text();
          botBubble.textContent = `Backend error (${res.status}): ${errText}`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");

        let buffer = "";
        let answer = "";
        let relevantContext = [];

        botBubble.textContent = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          const events = buffer.split("\n\n");
          buffer = events.pop() || "";

          for (const eventBlock of events) {
            const lines = eventBlock.split("\n");
            let eventName = "";
            let data = "";

            for (const line of lines) {
              if (line.startsWith("event:")) {
                eventName = line.replace("event:", "").trim();
              } else if (line.startsWith("data:")) {
                data += line.replace("data:", "").trim();
              }
            }

            if (eventName === "context") {
              try {
                relevantContext = JSON.parse(data);
              } catch {
                relevantContext = [];
              }
            } else if (eventName === "token") {
              try {
                const token = JSON.parse(data);
                answer += token;
                botBubble.textContent = answer;
                scrollToBottom();
              } catch {}
            } else if (eventName === "done") {
              renderActionBar(botExtra, answer, query);
              renderSources(botExtra, relevantContext);

              session.messages.push({
                type: "bot",
                text: answer,
                time: botMessage.time,
                sources: relevantContext,
                query: query
              });
              session.updated_at = Date.now();
              saveSessions();
              renderConversationList();
            }
          }
        }
      } catch (err) {
        botBubble.textContent = `Connection error: ${err.message}`;
      } finally {
        setBusyState(false);
        queryBox.focus();
      }
    }

    async function clearChat() {
      try {
        setBusyState(true);

        await fetch("/chat/clear", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: "clear",
            session_id: currentSessionId
          })
        });

        const session = getCurrentSession();
        if (session) {
          session.messages = [];
          session.title = "New Chat";
          session.updated_at = Date.now();
        }

        saveSessions();
        renderConversationList();
        renderCurrentSessionMessages();
      } catch (err) {
        createMessage("bot", `Could not clear chat: ${err.message}`);
      } finally {
        setBusyState(false);
      }
    }

    function attachChipEvents() {
      document.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          sendMessage(chip.dataset.prompt || "");
        });
      });
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportCurrentChatAsTxt() {
      const session = getCurrentSession();
      if (!session) return;

      const lines = [];
      lines.push(`Title: ${session.title}`);
      lines.push(`Created: ${new Date(session.created_at).toLocaleString()}`);
      lines.push(`Updated: ${new Date(session.updated_at).toLocaleString()}`);
      lines.push("");

      session.messages.forEach(msg => {
        const speaker = msg.type === "user" ? "User" : "Assistant";
        lines.push(`${speaker} (${msg.time || ""}):`);
        lines.push(msg.text || "");
        lines.push("");

        if (msg.type === "bot" && msg.sources?.length) {
          lines.push("Sources:");
          msg.sources.forEach(src => {
            lines.push(`- ${src.source}: ${src.text}`);
          });
          lines.push("");
        }
      });

      downloadFile(
        `${(session.title || "chat").replace(/[^\w\-]+/g, "_")}.txt`,
        lines.join("\n"),
        "text/plain"
      );
    }

    function exportCurrentChatAsJson() {
      const session = getCurrentSession();
      if (!session) return;

      downloadFile(
        `${(session.title || "chat").replace(/[^\w\-]+/g, "_")}.json`,
        JSON.stringify(session, null, 2),
        "application/json"
      );
    }

    function renameCurrentChat() {
      const session = getCurrentSession();
      if (!session) return;

      const nextTitle = prompt("Enter a new conversation title:", session.title || "New Chat");
      if (!nextTitle) return;

      session.title = nextTitle.trim() || session.title;
      session.updated_at = Date.now();
      saveSessions();
      renderConversationList();
    }

    function createAndSwitchNewChat() {
      currentSessionId = createNewSession();
      saveSessions();
      renderConversationList();
      renderCurrentSessionMessages();
      queryBox.focus();
    }

    sendBtn.addEventListener("click", () => sendMessage());
    clearBtn.addEventListener("click", clearChat);
    newChatBtn.addEventListener("click", createAndSwitchNewChat);
    renameChatBtn.addEventListener("click", renameCurrentChat);
    exportTxtBtn.addEventListener("click", exportCurrentChatAsTxt);
    exportJsonBtn.addEventListener("click", exportCurrentChatAsJson);

    queryBox.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    ensureCurrentSession();
    renderConversationList();
    renderCurrentSessionMessages();
  </script>
</body>
</html>
